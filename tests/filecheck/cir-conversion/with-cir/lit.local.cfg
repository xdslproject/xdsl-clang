import shutil

config.substitutions.append(("CIR_ROUNDTRIP", "xdsl-opt %s --split-input-file | cir-opt --verify-roundtrip -split-input-file | xdsl-opt --split-input-file | filecheck %s"))
config.substitutions.append(("CIR_GENERIC_ROUNDTRIP", "xdsl-opt %s --print-op-generic --split-input-file | cir-opt --mlir-print-op-generic --allow-unregistered-dialect -split-input-file | xdsl-opt --split-input-file | filecheck %s"))

if not shutil.which("cir-opt"):
    config.unsupported = True
